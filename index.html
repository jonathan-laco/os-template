<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS template</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <i class="fas fa-file-invoice"></i>
                <h1>OS <span>template</span></h1>
            </div>
            <nav class="mode-selector">
                <button id="btn-simple" class="nav-btn active" onclick="switchMode('simple')">
                    <i class="fas fa-bolt"></i><span> Simples</span>
                </button>
                <button id="btn-complex" class="nav-btn" onclick="switchMode('complex')">
                    <i class="fas fa-layer-group"></i><span> Complexa</span>
                </button>
                <button id="btn-config" class="nav-btn" onclick="switchMode('config')">
                    <i class="fas fa-cog"></i><span> Configurar</span>
                </button>
                <button id="btn-reset" class="nav-btn reset-btn" onclick="resetForm()">
                    <i class="fas fa-trash-alt"></i><span> Limpar</span>
                </button>
            </nav>
        </header>

        <main class="main-content">
            <!-- Left Layout: Inputs -->
            <section class="input-section glass">
                <div class="section-header">
                    <h2><i class="fas fa-edit"></i> <span id="mode-title">Ordem de Serviço Simples</span></h2>
                    <p>Preencha os dados abaixo para gerar a OS.</p>
                </div>
                
                <div id="form-container" class="form-grid">
                    <!-- Dynamic inputs will be injected here -->
                </div>

                <div id="config-container" class="config-panel hidden">
                    <h3>Personalização de Campos</h3>
                    <p>Selecione quais campos devem aparecer nos modos.</p>
                    <div class="config-actions">
                        <button class="copy-btn" onclick="resetSettingsToDefault()">
                            <i class="fas fa-rotate-left"></i> Voltar ao padrão
                        </button>
                    </div>
                    <div class="config-grids">
                        <div class="config-column">
                            <h4>Campos Disponíveis</h4>
                            <div id="fields-list" class="checkbox-list">
                                <!-- Checkboxes will be injected here -->
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right Layout: Preview -->
            <section class="preview-section">
                <div class="card glass">
                    <div class="card-header">
                        <h3><i class="fas fa-file-contract"></i> Ficha Técnica</h3>
                        <button class="copy-btn" onclick="copyContent('os-preview')">
                            <i class="fas fa-copy"></i> Copiar
                        </button>
                    </div>
                    <div class="preview-area">
                        <textarea id="os-preview" readonly spellcheck="false"></textarea>
                    </div>
                </div>

                <div class="card glass">
                    <div class="card-header">
                        <h3><i class="fab fa-telegram"></i> Mensagem Telegram</h3>
                        <button class="copy-btn" onclick="copyContent('telegram-preview')">
                            <i class="fas fa-copy"></i> Copiar
                        </button>
                    </div>
                    <div class="preview-area">
                        <textarea id="telegram-preview" readonly spellcheck="false"></textarea>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; Desenvolvido por Jonathan Laco | <span id="current-time"></span></p>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">Copiado com sucesso!</div>

    <script src="script.js"></script>
</body>
</html>
